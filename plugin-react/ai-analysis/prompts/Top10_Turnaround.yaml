Top10_Turnaround:
  output_path: ./summary/Top10_Turnaround.md
  prompt: |
    請從目前的美股市場，提取目前市場上最具潛力的轉機股清單，篩選出 **TOP 10 轉機股 (Turnaround Opportunities)**。
    **重要：請使用網路搜尋功能，主動查詢公司的最新管理層動向、債務重組進度、資產剝離計劃或產業週期變化。**

    【篩選與分析標準】
    1. **轉機邏輯辨識 (Turnaround Thesis)**：明確該股屬於哪類轉機：
       - **財務重整**：債務負擔減輕、利息支出下降或自由現金流轉正。
       - **管理層變更**：新任 CEO 或管理團隊上任後推動的戰略轉型。
       - **業務剝離與聚焦**：出售虧損部門，專注於核心盈利業務。
       - **產業週期底部**：所屬產業經歷深度衰退後，需求開始回升或供給端出清。
    2. **財務改善跡象 (Quantifiable Recovery)**：
       - **毛利率回升**：成本控制見效，毛利率連續兩季改善。
       - **營收回穩**：營收下滑速度減緩或開始小幅轉正。
    3. **安全性與估值 (Margin of Safety)**：
       - **資產支撐**：股價相對於帳面價值 (P/B) 或清算價值處於極低水平。
       - **極低期待**：市場情緒極度悲觀，分析師預期已降至最低。
    4. **技術面底部確認 (Bottoming Process)**：
       - 觀察股價是否已形成長期底部形態（如 W 底、圓弧底）。
       - 股價是否站穩 50 日均線，或在利空消息後股價不再破底，顯示利空出盡。
    5. **關鍵催化劑 (Catalysts)**：尋找能觸發估值修復的具體事件（如盈餘超預期、重大資產出售完成、或新合約簽署）。

    【輸出格式要求】
    # TOP 10 轉機股 (逆境重生) 深度分析報告

    ## 1. 總覽表格
    請提供一個包含以下欄位的 Markdown 表格，依成功轉機機率與報酬潛力排序：
    | 排名 | 代碼 | 公司名稱 | 轉機類型 | 核心困境 | 關鍵催化劑 | 成功機率 (1-10) | 推薦等級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 轉機市場現況分析
    簡述當前市場哪些產業（如能源、零售、傳產）正處於週期性底部，或具備較多轉機機會。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的分析：
    ### [排名]. [代碼] [公司名稱] — [轉機進度評估]
    - **困境原因背景**：簡述該公司過去為何陷入困境（如管理失當、技術過時、債務過高）。
    - **轉機契機解析**：詳細說明目前的具體改善措施及為何這次轉機能夠成功。
    - **財務數據亮點**：列出近期顯現的復甦跡象（如營收轉折、淨損縮小）。
    - **潛在失敗風險 (Fatal Risks)**：指出可能導致轉機失敗的致命因素（如資金斷鍊、二次違約）。
    - **投資策略與預期**：給予建議的 **建倉策略 (例如：分階段買入)**、**轉機完成目標價** 及 **風險停損位**。

    ## 4. 轉機股投資組合管理
    - 特別強調轉機股的「失敗率」通常較高，給予投資者如何分散配置與控制總倉位的建議。

    ## 5. 結論與風控提醒
    - 提醒投資者密切關注「財報細節」而非僅看表面獲利，並建議設定嚴格的時間止損。

    請確保分析內容嚴謹，直接引用網路搜尋到的最新管理層言論或重組細節，避免過度樂觀的臆測。
