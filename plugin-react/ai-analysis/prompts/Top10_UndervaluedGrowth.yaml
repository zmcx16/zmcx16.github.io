Top10_UndervaluedGrowth:
  output_path: ./summary/Top10_UndervaluedGrowth.md
  prompt: |
    從 `trade-data.json` 中的 `watch_stock_list` 提取目前市場上被嚴重低估但具備高成長潛力的個股，篩選出 **TOP 10 低估成長股 (Undervalued Growth / GARP)**。
    **重要：請使用網路搜尋功能，主動查詢公司的最新 P/E 歷史分位數、PEG 指標、以及分析師對未來的成長預期修正情況。**

    【篩選標準】
    1. **估值吸引力 (Valuation at a Discount)**：
       - **P/E 歷史分位數**：目前的 Forward P/E 應顯著低於其過去 3-5 年的平均水平（最好處於 25% 分位以下）。
       - **PEG 指標**：PEG (P/E / Expected Growth Rate) 應接近或低於 1.0，顯示成長性尚未反映在股價中。
    2. **成長動能 (Growth Acceleration)**：
       - **營收與 EPS**：過去數季顯示出增長加速的跡象，或市場對其未來 1-2 年的成長預期正在上修。
    3. **低基期原因辨識 (Low Base Logic)**：
       - 分析導致目前股價低迷的原因（例如：短期利空壓制、產業過度修正、或市場偏見），並確認這些因素是否為「暫時性」且不影響長期基本面。
    4. **安全性 (Margin of Safety)**：
       - 結合內在價值評估（如 DCF 或相對估值），計算目前的股價相對於公允價值的折價空間（應大於 20%）。
    5. **市場競爭力 (Competitive Edge)**：
       - 即使在低估期，該企業仍需維持其核心競爭力與市場份額，具備強大的護城河。

    【輸出格式要求】
    # TOP 10 低估成長股 (GARP) 深度分析報告

    ## 1. 總覽表格
    | 排名 | 代碼 | 公司名稱 | 產業 | Forward P/E | 歷史 P/E 分位 | PEG 指標 | 目標價空間 (%) | 推薦等級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. GARP 市場環境解析
    簡述當前宏觀環境下（如利率展望、資金偏好），為什麼尋找「合理價格下的成長」是目前的優選策略。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的分析：
    ### [排名]. [代碼] [公司名稱] — [核心低估理由]
    - **財務數據精華**：列出關鍵指標（ROE、FCF 表現、營收成長率與 P/E 趨勢）。
    - **價值回歸邏輯**：說明目前的低估是如何形成的，以及未來什麼事件（催化劑）將推動股價回歸其內在價值。
    - **成長潛力解析**：深入分析其未來 1-2 年的增長支撐點（如新市場、產能開出、效率提升）。
    - **關鍵風險 (Cons)**：列出可能導致「價值陷阱」(Value Trap) 的因素，即股價長期無法回升的風險點。
    - **操作建議**：給予建議的 **買入價格區間**、**中期目標價** 與 **止損建議**。

    ## 4. 產業與策略配置建議
    - 分析這 10 檔個股在不同板塊的分佈情況，判斷哪些板塊正處於最嚴重的低估狀態。

    ## 5. 結論與風險提示
    - 提醒投資者辨識「暫時性利空」與「基本面惡化」的差異。

    請確保分析內容嚴謹，直接引用網路搜尋到的最新估值分位數與成長數據，避免主觀過度樂觀。
