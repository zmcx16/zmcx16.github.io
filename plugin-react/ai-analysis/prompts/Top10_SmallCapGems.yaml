Top10_SmallCapGems:
  output_path: ./summary/Top10_SmallCapGems.md
  prompt: |
    請從目前的美股市場，篩選出 **TOP 10 小型股黑馬 (Small-Cap Gems)**。
    **重要：請使用網路搜尋功能，主動查詢公司的即時市值、最新財報預期、利基市場地位與內部人持股動態。**

    【篩選標準】
    1. **市值區間 (Small-Cap Definition)**：優先鎖定市值在 $300M 到 $2B 之間的個股，這是最容易出現翻倍漲幅的「甜點區間」。
    2. **利基市場領導力 (Niche Leadership)**：個股應在其細分市場 (Niche Market) 擁有技術優勢、高進入障礙或顯著的市場份額，具備成為「隱形冠軍」的潛力。
    3. **增長轉折點 (Inflection Point)**：
       - **營收加速**：尋找營收成長正在加速、或即將從虧損轉為盈餘 (Turnaround) 的個股。
       - **研發或產品里程碑**：關注近期有重大研發突破或新產品獲准上市的小型企業。
    4. **籌碼與內部人動向 (Insider & Inst. Interest)**：
       - **高內部持股**：管理層持有高比例股份，顯示其利益與股東一致。
       - **機構建倉**：近期有知名小型股基金或機構投資者開始介入。
    5. **相對強度 (Relative Strength vs IWM)**：股價表現應優於羅素 2000 指數 (IWM)，且成交量在底部盤整後有顯著溫和放大的跡象。

    【輸出格式要求】
    # TOP 10 小型股黑馬深度分析報告

    ## 1. 總覽表格
    請提供一個包含以下欄位的 Markdown 表格，依潛力爆發力排序：
    | 排名 | 代碼 | 公司名稱 | 產業 | 市值 (M) | 預期營收成長 (%) | 內部持股 (%) | 技術 RS 指標 | 推薦等級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 小型股市場環境分析
    簡述當前宏觀環境（如利率變化、風險偏好程度）對小型股板塊的整體影響。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的分析：
    ### [排名]. [代碼] [公司名稱] — [為什麼是黑馬？]
    - **利基競爭優勢**：說明其產品或服務在特定細分市場中的獨特性。
    - **爆發催化劑 (Catalysts)**：預計在未來 6-12 個月內推動股價爆發的關鍵事件（如獲利轉正、重大合約、收購傳聞）。
    - **財務數據精華**：列出關鍵指標（如現金儲備與燒錢速度分析、毛利率變動趨勢）。
    - **投機風險 (Cons)**：指出小型股常見的風險，如成交量不足、高波動性、融資稀釋風險。
    - **操作建議**：給予具體的 **分批建倉區間**、**預期目標價** 及 **嚴格的停損點位**。

    ## 4. 投資風險警告與倉位管理
    - 特別強調小型股的高波動特性，並給予投資者適當的倉位配置比例建議（如單一小型股不超過投資組合 2-5%）。

    ## 5. 結論
    - 總結這些小型股未來成為中、大型股的機率與長期展望。

    請確保分析內容嚴謹，直接引用網路搜尋到的最新市值與內部持股數據，避免過於投機且無根據的預測。
