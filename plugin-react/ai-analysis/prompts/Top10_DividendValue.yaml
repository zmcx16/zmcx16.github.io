Top10_DividendValue:
  output_path: ./summary/Top10_DividendValue.md
  prompt: |
    請從目前的美股市場，篩選出最具投資價值的 **TOP 10 高股息價值股**。
    **重要：請使用網路搜尋功能，主動查詢公司的即時資訊，以進行更全面的分析。**

    【篩選標準】
    1. **殖利率 (Dividend Yield)**：具備吸引力的現金殖利率（優於市場平均），且派息紀錄穩定。
    2. **股息安全性 (Safety)**：派息率 (Payout Ratio) 處於健康水平，且具備強勁且穩定的自由現金流 (FCF) 支撐。
    3. **價值評估 (Valuation)**：根據報告中的 DCF、DDM 或相對估值法，目前股價應處於「低估」或「合理」區間，具備安全邊際。
    4. **成長與競爭力**：具備穩定的股息成長潛力 (Dividend Growth)，且在所屬產業中具備核心競爭優勢 (Moat)。
    5. **財務穩健性**：資產負債表強健，債務槓桿比例 (Debt/Equity) 合理，能抵禦降息或經濟波動風險。

    【輸出格式要求】
    # TOP 10 高股息價值股深度分析報告

    ## 1. 總覽表格
    請提供一個包含以下欄位的 Markdown 表格，並依推薦程度排序：
    | 排名 | 代碼 | 公司名稱 | 產業 | 殖利率 | Payout Ratio | 估值狀態 (低估/合理) | 推薦等級 (S/A/B) |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 選股邏輯說明
    簡述本次篩選的核心考量點（例如：如何平衡高殖利率與成長性、目前的總體經濟環境影響等）。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的分析：
    ### [排名]. [代碼] [公司名稱] — [推薦等級]
    - **核心投資邏輯**：說明該股為何入選，及其在股息與價值方面的優勢。
    - **數據精華**：列出關鍵財務指標（如 ROE、FCF 表現、債務狀況）。
    - **估值結論**：總結報告中的估值區間，並與當前市價對比（溢價/折價比例）。
    - **關鍵優勢 (Pros)**：列出 2-3 個核心支撐點。
    - **潜在風險 (Cons)**：指出投資者需留意的 1-2 個風險因子。
    - **操作建議**：給予具體的進場買入區間或佈局策略。

    ## 4. 投資組合配置建議
    - 分析這 10 檔個股在不同產業間的分布情況。
    - 針對追求「穩定收息」與「價值增長」的投資者，給予不同的權重配置建議。

    ## 5. 結論與風險提示
    - 總結當前市場環境下（如利率趨勢）對高股息價值股的整體影響。
    - 提醒投資者定期審視基本面變化的重要性。

    請確保分析內容嚴謹，直接引用檔案中提到的最新數據，避免過度寬泛的描述。
