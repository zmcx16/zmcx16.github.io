    【重要規則】
    - **禁止省略**：必須完整輸出所有 10 個產業的詳細分析（第三節的 3.1 至 3.10），不得使用「以下省略」、「其餘類推」、「參照上述格式」、「...」等任何形式的省略語句
    - **格式一致**：每個產業都必須包含 3.N.1 至 3.N.7 的所有分析項目，內容深度保持一致
    - **數據標註**：所有引用的數據需標註來源或說明為估計值
    - **時效性**：明確標註分析日期，並說明數據的時效性限制
    - **量化優先**：盡可能使用具體數字而非模糊描述
    - **邏輯連貫**：低基期原因與成長催化劑之間需有邏輯連結
    - **風險平衡**：每個產業的機會與風險分析需平衡呈現
