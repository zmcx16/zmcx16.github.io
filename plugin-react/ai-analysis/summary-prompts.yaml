    Electronic Gaming & Multimedia, Other Precious Metals & Mining, Closed-End Fund - Debt, 
    Utilities - Regulated Water, Auto Manufacturers, Banks - Diversified, 
    Consulting Services, Resorts & Casinos, Other Industrial Metals & Mining, 
    Lumber & Wood Production, Real Estate Services, Beverages - Wineries & Distilleries, 
    Personal Services, Capital Markets, Packaged Foods, Discount Stores, 
    Travel Services, Oil & Gas Drilling, Oil & Gas Integrated, Tobacco, 
    Residential Construction, Footwear & Accessories, Department Stores, 
    Financial Data & Stock Exchanges, Beverages - Non-Alcoholic, Uranium, 
    Agricultural Inputs, Scientific & Technical Instruments, REIT - Healthcare Facilities, 
    Household & Personal Products, Lodging, Steel, Paper & Paper Products, 
    Marine Shipping, Railroads, REIT - Industrial, Apparel Manufacturing, 
    Building Materials, Recreational Vehicles, Copper, Home Improvement Retail, 
    Luxury Goods, Real Estate - Development, Publishing, Tools & Accessories, 
    Insurance - Reinsurance, Pharmaceutical Retailers, Coking Coal, 
    Real Estate - Diversified, Confectioners, Financial Conglomerates, Exchange Traded Fund

    【評估標準】
    1. 低基期指標（產業層面，至少符合2項）：
       - 產業平均 P/E 低於歷史均值或市場整體 P/E
       - 產業平均 P/B < 2.0x
       - 產業整體股價距離 52 週高點跌幅 > 30%
       - 產業 ETF 或主要成分股估值處於歷史低檔區間
       - 市場資金流出、投資人情緒低迷
       - 產業週期處於谷底或復甦初期

    2. 高成長潛力指標（產業層面，至少符合2項）：
       - 產業預期營收成長率 > 10%
       - 產業預期獲利成長率 > 15%
       - 具備明確的產業成長驅動因素（政策利多、技術突破、需求爆發等）
       - 長期結構性成長趨勢（人口結構、消費升級、能源轉型等）
       - 產業整合機會或龍頭企業市佔提升空間
       - 分析師對產業展望多數為正面

    3. 排除條件：
       - 排除結構性衰退產業（無明確反轉契機）
       - 排除 Shell Companies、Closed-End Fund 等非實質營運產業
       - 排除高度監管風險且無明確解套路徑的產業

    【輸出格式】
    - Markdown 格式
    - 總覽表格（排名、產業名稱、低基期理由摘要、成長催化劑、預期成長率、風險等級）
    - 每個產業詳細分析（**必須完整輸出全部 10 個產業，不得省略任何一個**）：
      * 產業概述與現況
      * 低基期原因（估值、股價位置、資金流向）
      * 成長驅動因素（短中長期催化劑）
      * 代表性個股推薦（2-3檔）
      * 投資時程建議（短線/中線/長線）
      * 主要風險因素
    - 產業配置策略建議（依風險承受度分類）
    - 總結與風險提示

    【重要規則】
    - **禁止省略**：必須完整輸出所有 10 個產業的詳細分析，不得使用「以下省略」、「其餘類推」、「參照上述格式」等任何形式的省略語句
    - **格式一致**：每個產業都必須包含上述所有分析項目，內容深度保持一致
    - **無論篇幅長短，都必須逐一完整呈現每個產業的分析內容**
