Top10_UndervaluedGrowth:
  output_path: ./summary/Top10_UndervaluedGrowth.md
  prompt: |
    請分析 plugin-react/ai-analysis 目錄下所有股票分析檔案，篩選出 TOP 10 低基期且具高成長潛力的公司。

    【評估標準】
    1. 低基期指標（至少符合2項）：
       - Forward P/E < 15x
       - PEG < 1.0
       - P/FCF < 12x
       - P/B < 2.0x
       - 股價距離52週高點跌幅 > 40%
       - 當前價格低於 DCF 估值 20%+

    2. 高成長潛力指標（至少符合2項）：
       - 預期 EPS 成長率 > 15%
       - 營收年成長率 > 10%
       - 產業處於成長期或週期底部反轉
       - 分析師目標價上漲空間 > 20%
       - 有明確的成長催化劑（新產品、併購整合、市場擴張等）

    【輸出格式】
    - Markdown 格式
    - 包含：總覽表格（排名、代碼、公司名、產業、Forward P/E、低基期理由、成長催化劑、目標價上漲空間）
    - 每檔個股詳細分析（關鍵指標表、低基期理由、成長潛力、DCF估值區間）
    - 投資策略建議（依風險等級分類）
    - 風險提示


Top10_DividendValue:
  output_path: ./summary/Top10_DividendValue.md
  prompt: |
    請分析 plugin-react/ai-analysis 目錄下所有股票分析檔案，篩選出 TOP 10 高股息價值股。

    【評估標準】
    1. 股息指標（至少符合2項）：
       - 殖利率 > 3%
       - 連續配息年數 > 5年
       - 股息成長率 > 5%
       - Payout Ratio < 70%

    2. 財務穩健指標（至少符合2項）：
       - Debt/Equity < 1.0
       - 自由現金流為正
       - ROE > 12%
       - 營收穩定或成長

    【輸出格式】
    - Markdown 格式
    - 總覽表格（排名、代碼、公司名、殖利率、連續配息年數、股息成長率、Payout Ratio）
    - 每檔個股詳細分析
    - 適合長期存股的建議

Top10_Momentum:
  output_path: ./summary/Top10_Momentum.md
  prompt: |
    請分析 plugin-react/ai-analysis 目錄下所有股票分析檔案，篩選出 TOP 10 動能強勢股。

    【評估標準】
    1. 技術面動能（至少符合2項）：
       - 股價位於 52週高點附近（距離 < 10%）
       - 近3個月漲幅 > 15%
       - 成交量放大趨勢
       - 突破重要均線或壓力位

    2. 基本面支撐（至少符合1項）：
       - 近期財報優於預期
       - 分析師上調評級或目標價
       - 營收/EPS 加速成長
       - 產業利多題材

    【輸出格式】
    - Markdown 格式
    - 總覽表格（排名、代碼、公司名、近3月漲幅、距52週高點、催化劑）
    - 每檔個股詳細分析
    - 進場時機與停損建議

Top10_Turnaround:
  output_path: ./summary/Top10_Turnaround.md
  prompt: |
    請分析 plugin-react/ai-analysis 目錄下所有股票分析檔案，篩選出 TOP 10 轉機股。

    【評估標準】
    1. 轉機訊號（至少符合2項）：
       - 過去虧損但近期轉盈或即將轉盈
       - 營運效率改善（毛利率/營益率提升）
       - 新管理層上任或策略轉型
       - 資產重組、剝離虧損業務
       - 產業週期觸底反彈

    2. 估值吸引力：
       - 股價較歷史高點大幅折價
       - P/B < 1.5x
       - 企業價值被低估

    【輸出格式】
    - Markdown 格式
    - 總覽表格（排名、代碼、公司名、轉機類型、關鍵催化劑、風險等級）
    - 每檔個股詳細分析（困境原因、轉機契機、時程預估）
    - 風險警示（轉機股風險較高）

Top10_QualityGrowth:
  output_path: ./summary/Top10_QualityGrowth.md
  prompt: |
    請分析 plugin-react/ai-analysis 目錄下所有股票分析檔案，篩選出 TOP 10 優質成長股。

    【評估標準】
    1. 品質指標（至少符合3項）：
       - ROE > 15%
       - ROIC > 12%
       - 毛利率 > 30%
       - 自由現金流持續為正
       - Debt/Equity < 0.5
       - 具備護城河（品牌、專利、網路效應等）

    2. 成長指標（至少符合2項）：
       - 營收年複合成長率 > 10%
       - EPS 年複合成長率 > 12%
       - 可預見的長期成長動能

    【輸出格式】
    - Markdown 格式
    - 總覽表格（排名、代碼、公司名、ROE、營收成長率、護城河類型）
    - 每檔個股詳細分析
    - 長期持有建議

Top10_SmallCapGems:
  output_path: ./summary/Top10_SmallCapGems.md
  prompt: |
    請分析 plugin-react/ai-analysis 目錄下所有股票分析檔案，篩選出 TOP 10 小型股潛力股。

    【評估標準】
    1. 規模條件：
       - 市值 < 100億美元（或相對較小）

    2. 成長潛力（至少符合2項）：
       - 營收成長率 > 15%
       - 處於高成長產業
       - 市佔率有擴張空間
       - 創新商業模式或技術

    3. 財務健康（至少符合2項）：
       - 毛利率穩定或提升
       - 現金充足、不需頻繁增資
       - 獲利能力改善趨勢

    【輸出格式】
    - Markdown 格式
    - 總覽表格（排名、代碼、公司名、市值、產業、成長率、潛力亮點）
    - 每檔個股詳細分析
    - 小型股投資風險提示