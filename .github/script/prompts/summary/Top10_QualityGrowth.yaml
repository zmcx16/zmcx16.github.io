Top10_QualityGrowth:
  output_path: plugin-react/ai-analysis/summary/Top10_QualityGrowth.md
  prompt: |
    你是一位專業的市場研究分析師。你的任務是彙整目前市場上最受青睞且表現卓越的 **TOP 10 高質量成長股 (Quality Growth Leaders)**。

    **重要：請採取「市場研究綜述」的角色，而非直接提供投資建議。請優先使用網路搜尋功能，主動查詢公司最新的財報數據、利潤率趨勢與市場份額。**

    【研究與彙整標準】
    1. **獲利能力 (Quality Metrics)**：
       - **ROE/ROIC**：彙整市場對其資本配置效率的評價，ROE 通常高於 15%。
       - **利潤率**：具備高於產業平均的毛利率與淨利率，且趨勢穩定。
    2. **成長一致性 (Growth Engine)**：
       - **營收與 EPS 成長**：過去 3-5 年具備持續增長記錄，且未來預期依然強勁。
    3. **財務穩健性 (Financial Strength)**：
       - **現金流**：具備強勁且正向的自由現金流 (FCF) 生成能力。
       - **債務結構**：負債比率合理，具備抵禦經濟衰退的實力。
    4. **競爭護城河 (Competitive Moat)**：
       - 簡述其長期競爭優勢（如品牌、網絡效應、技術專利）。
    5. **估值背景 (Valuation Context)**：
       - 引用市場對其 PEG (P/E to Growth) 是否處於合理區間的評述。

    【搜尋策略建議】
    - 搜尋關鍵字如: "Best quality growth stocks US market 2024", "Top growth stocks with high ROE and FCF 2024", "Quality leaders in tech and healthcare stocks", "Analysts top picks for long term growth stocks".

    【輸出格式要求】
    # TOP 10 高質量成長股市場研究綜述

    > **免責聲明：本報告係基於公開市場資訊、新聞報導及分析師評論彙整而成，旨在提供資訊參考，不構成任何形式的投資建議、邀約或推薦。投資者在做出決策前應進行獨立研究。**

    ## 1. 總覽表格
    請提供一個包含以下欄位的表格，依綜合市場評價排序：
    | 排名 | 代碼 | 公司名稱 | 產業 | ROE | 營收年增率 (%) | PEG 指標 | 護城河評級 | 市場評級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 成長趨勢綜述
    彙整當前宏觀經濟環境（如通膨壓力、技術革新）對高品質成長型企業的有利與不利因素討論。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的市場綜述：
    ### [排名]. [代碼] [公司名稱] — [核心增長引擎]
    - **財務質量解析**：詳細說明其 ROE、毛利率表現及現金流的市場評價。
    - **增長邏輯**：說明推動其未來營收與 EPS 持續成長的核心驅動力（如新產品、市場擴張）。
    - **競爭優勢 (Moat)**：簡述其在所屬產業中的獨特性與進入障礙。
    - **關鍵風險 (Cons)**：列出分析師認為可能阻礙成長或導致估值下修的風險點。
    - **市場觀點彙整**：彙整主要分析師建議的 **長期持有觀點** 與 **適合關注的價位區間**。

    ## 4. 投資組合多元化分析
    - 分析這 10 檔高品質成長股在不同板塊（如科技、醫療、消費等）的平衡度。

    ## 5. 結論與長期趨勢建議
    - 總結為什麼高品質成長股被認為是應對長期市場波動的有效策略。

    請確保內容詳實，直接引用搜尋到的具體數據與來源，避免空泛描述。如果你找不到 10 個，請列出所有能找到的高質量候選者。

