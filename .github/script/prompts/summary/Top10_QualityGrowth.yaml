Top10_QualityGrowth:
  output_path: plugin-react/ai-analysis/summary/Top10_QualityGrowth.md
  prompt: |
    請從目前的美股市場，篩選出 **TOP 10 高質量成長股 (Quality Growth Leaders)**。
    **重要：請使用網路搜尋功能，主動查詢公司的即時財報數據、利潤率趨勢與市場份額，以進行深度分析。**

    【篩選標準】
    1. **獲利能力 (Quality Metrics)**：
       - **ROE/ROIC**：股東權益報酬率 (ROE) 應高於 15%，且投入資本回報率 (ROIC) 表現優異，顯示資本配置效率極高。
       - **利潤率**：具備高於行業平均的毛利率 (Gross Margin) 與淨利率 (Net Margin)，且利潤率呈現穩定或擴張趨勢。
    2. **成長一致性 (Growth Engine)**：
       - **營收與 EPS 成長**：過去 3-5 年營收與每股盈餘 (EPS) 具備持續的雙位數增長，且分析師對未來 1-2 年的增長預期依然強勁。
    3. **財務穩健性 (Financial Strength)**：
       - **現金流**：具備強勁且正向的自由現金流 (FCF) 生成能力。
       - **債務結構**：負債比率 (Debt/Equity) 合理，具備抵禦經濟衰退的強大資產負債表。
    4. **競爭護城河 (Competitive Moat)**：
       - 具備明顯的長期競爭優勢（如品牌霸權、網路效應、技術專利或極高的轉換成本）。
    5. **估值考量 (Valuation Context)**：
       - 雖然成長股通常具備溢價，但應優先選擇 PEG (P/E to Growth) 處於合理區間、或相對於其成長速度未過度高估的個股。

    【輸出格式要求】
    # TOP 10 高質量成長股深度分析報告

    ## 1. 總覽表格
    請提供一個包含以下欄位的 Markdown 表格，依綜合評分排序：
    | 排名 | 代碼 | 公司名稱 | 產業 | ROE | 營收年增率 (%) | PEG 指標 | 護城河類型 | 推薦等級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 成長趨勢綜述
    簡述當前宏觀經濟下（如通膨壓力、技術革新、消費趨勢）對高品質成長型企業的有利與不利因素。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的分析：
    ### [排名]. [代碼] [公司名稱] — [核心增長引擎]
    - **財務質量解析**：詳細說明其 ROE、毛利率表現及現金流的優點。
    - **增長邏輯**：說明推動其未來營收與 EPS 持續成長的核心驅動力（如新產品、市場擴張等）。
    - **競爭優勢 (Moat)**：深入分析其在所屬產業中的獨特性與進入障礙。
    - **關鍵風險 (Cons)**：列出可能阻礙成長路徑或導致估值下修的 1-2 個風險點。
    - **投資策略**：給予具體的 **長期持有評價** 與 **適合佈局的價格區間**。

    ## 4. 投資組合多元化分析
    - 分析這 10 檔高品質成長股在不同板塊（如科技、醫療、消費等）的平衡度。

    ## 5. 結論與長期持有建議
    - 總結為什麼高品質成長股是應對長期市場波動的最佳策略，並提醒定期追蹤財報動態。

    請確保分析內容嚴謹，直接引用網路搜尋到的最新財報指標，避免過於籠統的描述。
