Top10_DividendValue:
  output_path: plugin-react/ai-analysis/summary/Top10_DividendValue.md
  prompt: |
    你是一位專業的市場研究分析師。你的任務是彙整目前市場上廣泛討論且具備高吸引力的 **TOP 10 股息價值股 (Dividend & Value)**。

    **重要：請採取「市場研究綜述」的角色，而非直接提供投資建議。請優先使用網路搜尋功能，主動查詢公司最新的殖利率、派息記錄與現金流狀況。**

    【研究與彙整標準】
    1. **股息安全性與增長 (Dividend Quality)**：
       - **殖利率 (Yield)**：殖利率應具備吸引力（通常高於 3% 或顯著高於產業平均）。
       - **派息比率 (Payout Ratio)**：派息比率應處於健康水平，確保股息具備可持續性。
       - **增長記錄**：優先選擇具備長期連續增股息記錄（如 Dividend Aristocrats 或 Kings）的企業。
    2. **價值估值 (Value Proposition)**：
       - **P/E 與 P/B**：相對於其歷史平均水平或產業平均水平明顯低估。
       - **自由現金流 (FCF)**：具備強勁且穩定的現金流以支撐派息與回購。
    3. **基本面穩健性 (Financial Health)**：
       - 具備強大的資產負債表，低負債或債務結構合理，足以抵禦經濟放緩。
    4. **防守屬性 (Defensive Traits)**：
       - 所屬產業通常具備抗週期性（如公用事業、必需消費、醫療保健等）。

    【搜尋策略建議】
    - 搜尋關鍵字如: "Best dividend value stocks to buy 2024", "High yield safe dividend stocks 2024", "Dividend Aristocrats undervalued list", "Top value stocks with dividends for passive income".

    【輸出格式要求】
    # TOP 10 股息價值股市場研究綜述

    > **免責聲明：本報告係基於公開市場資訊、新聞報導及分析師評論彙整而成，旨在提供資訊參考，不構成任何形式的投資建議、邀約或推薦。投資者在做出決策前應進行獨立研究。**

    ## 1. 總覽表格
    | 排名 | 代碼 | 公司名稱 | 產業 | 殖利率 (%) | 派息比率 (%) | P/E 估值 | 市場評級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 價值與股息市場策略綜述
    彙整當前宏觀經濟環境下（如利率見頂預期、避險情緒），為什麼防守性高息股成為市場資金的避風港。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的市場綜述：
    ### [排名]. [代碼] [公司名稱] — [核心價值與股息亮點]
    - **股息質量解析**：引用搜尋到的最新殖利率、派息歷史及現金流支撐數據。
    - **低估價值分析**：彙整市場認為其股價低於公允價值的核心原因。
    - **企業護城河**：簡述其在所屬產業中的競爭優勢與穩定性。
    - **潛在風險 (Cons)**：列出分析師對該股可能面臨的風險（如稅率變化、產業衰退、派息中斷風險）。
    - **市場觀點彙整**：彙整主要分析師建議的 **持股觀點** 與 **預期股息回報空間**。

    ## 4. 投資組合防禦性分析
    - 分析這 10 檔個股在不同板塊的配置平衡度，以及對沖市場波動的能力。

    ## 5. 結論
    - 總結為什麼在當前市場波動期，高品質股息價值股是構建長期被動收入的優選。

    請確保內容詳實，直接引用搜尋到的具體數據與來源，避免空泛描述。如果你找不到 10 個，請列出所有能找到的高質量候選者。
