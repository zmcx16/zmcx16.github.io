Top10_UndervaluedGrowthIndustries:
  output_path: plugin-react/ai-analysis/summary/Top10_UndervaluedGrowthIndustries.md
  prompt: |
    你是一位專業的產業研究主管。你的任務是從美股市場中，篩選出 **TOP 10 低基期且具高成長潛力的產業**。

    **重要：請採取「產業研究綜述」的角色，而非直接提供投資建議。請優先使用網路搜尋功能，結合 Finviz, Bloomberg, Reuters 等即時數據，進行深度分析。**

    【研究與篩選邏輯】
    請針對提供的產業清單（見下方），彙整並篩選出目前符合「低基期」且「高成長」雙重特徵的 10 個產業：
    1. **低基期評估**：
       - **估值優勢**：Forward P/E, P/B 或 P/S 是否顯著低於歷史平均或大盤。
       - **股價位置**：是否距 52 週高點有顯著回撤，或在底部區域盤整。
       - **資金情緒**：市場情緒是否過度悲觀，或資金流向開始出現轉折。
    2. **成長潛力評估**：
       - **盈利預期**：產業預期營收或 EPS 增長率是否領先其他板塊。
       - **產業催化劑**：是否有政策支持、技術突破或結構性需求趨勢。
    3. **週期定位**：
       - 優先選擇處於「谷底期」或「復甦初期」的產業。

    【產業類別參考清單】
    (包含但不限於以下類別：Diagnostics & Research, Aluminum, REITs, Airlines, Semiconductors, Aerospace & Defense, Banks, Biotechnology, Software, Utilities, Oil & Gas, etc.)

    【搜尋策略建議】
    - 搜尋關鍵字如: "Most undervalued stock industries 2024", "High growth potential industries US market 2024", "Cyclical recovery industries 2024", "Finviz industry performance analysis".

    【輸出格式要求】
    # TOP 10 低基期高成長產業市場研究綜述

    > **免責聲明：本報告係基於公開市場資訊、新聞報導及分析師評論彙整而成，旨在提供資訊參考，不構成任何形式的投資建議、邀約或推薦。投資者在做出決策前應進行獨立研究。**

    ## 1. 執行摘要
    - 分析日期與當前市場環境概述（如利率環境、整體估值水平）。
    - 本次篩選的核心投資主題總結。

    ## 2. 總覽表格
    | 排名 | 產業名稱 | 綜合評價 | 週期位置 | 代表性 ETF | Forward P/E | 預期增長 | 風險等級 | 核心催化劑 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選產業，請提供以下結構化的市場綜述：
    ### [第 N 名]. 產業名稱
    - **產業現況與定義**：簡述其業務範疇與目前的市場競爭格局。
    - **低基期邏輯剖析**：引用數據說明目前的估值折價程度，及導致低迷的外部因素是否為暫時性。
    - **成長驅動因素**：彙整短期、中期與長期的核心增長驅動力與關鍵催化劑。
    - **宏觀敏感度分析**：評估該產業對利率、通膨與地緣政治的敏感程度。
    - **市場關注標的推薦**：列出 2-3 個市場認可的領先個股或相關 ETF。
    - **風險因素與監控**：列出分析師擔憂的主要風險及應持續關注的領先指標。

    ## 4. 產業輪動與配置策略
    - 總結專家對於當前產業輪動趨勢的看法，以及不同風險偏好者的配置建議。

    ## 5. 結論與風險提示
    - 總結最具信心的 3 個產業主題。
    - 數據局限性說明與整體免責聲明。

    請確保內容詳實，直接引用搜尋到的具體數據與來源，禁止省略任何排名項。
