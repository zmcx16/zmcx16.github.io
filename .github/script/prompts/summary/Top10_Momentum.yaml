Top10_Momentum:
  output_path: plugin-react/ai-analysis/summary/Top10_Momentum.md
  prompt: |
    你是一位專業的市場研究分析師。你的任務是彙整目前市場上討論度最高且展現強勁爆發力的 **TOP 10 動能強勢股 (Momentum Leaders)**。

    **重要：請採取「市場研究綜述」的角色，而非直接提供投資建議。請優先使用網路搜尋功能，主動查詢公司即時的股價走勢、成交量與技術指標趨勢。**

    【研究與彙整標準】
    1. **趨勢強度 (Trend Stage)**：尋找處於上升趨勢的個股，股價應位於關鍵均線（如 50 日、200 日）之上。
    2. **相對強度 (Relative Strength, RS)**：股價表現顯著優於大盤 (S&P 500/Nasdaq)，且接近 52 週高點。
    3. **成交量驗證 (Volume Verification)**：彙整市場對其近期成交量變化的觀察，是否存在顯著的資金介入跡象。
    4. **價格行為 (Price Action)**：描述個股是否出現經典的突破形態（如 Cup with Handle, Bull Flag 等）。
    5. **市場催化劑 (Catalysts)**：找出推動近期股價飆升的核心事件（如財報驚喜、重大併購、產業熱點）。

    【搜尋策略建議】
    - 搜尋關鍵字如: "Strongest momentum stocks to buy now 2024", "US stocks hitting new 52 week highs 2024", "Top growth stocks with price breakout", "Stocks with highest relative strength index 2024".

    【輸出格式要求】
    # TOP 10 市場動能強勢股市場研究綜述

    > **免責聲明：本報告係基於公開市場資訊、新聞報導及分析師評論彙整而成，旨在提供資訊參考，不構成任何形式的投資建議、邀約或推薦。投資者在做出決策前應進行獨立研究。**

    ## 1. 總覽表格
    請提供一個包含以下欄位的表格，依動能強度或市場熱度排序：
    | 排名 | 代碼 | 公司名稱 | 產業 | 近3月漲幅 | 距52週高點 (%) | 技術面評述 | 市場評級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 動能環境說明
    彙整當前市場廣度 (Market Breadth) 與主流產業熱點（如 AI、能源、生技等）的資金流向觀察。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的市場綜述：
    ### [排名]. [代碼] [公司名稱] — [近期市場關注點]
    - **技術面特徵**：描述其目前的均線排列狀態、突破點位及相對強度表現。
    - **量價行為分析**：彙整市場對其近期大漲時成交量變化的討論。
    - **關鍵驅動因素 (Pros)**：列出推動股價續創新高的核心驅動力。
    - **市場隱憂 (Cons)**：列出分析師對該股是否過度延伸 (Extended) 或存在回調風險的擔憂。
    - **操作觀點彙整**：彙整主要市場分析師建議的 **參考進場區間** 與 **技術支撐位**。

    ## 4. 產業板塊集中度分析
    - 分析這 10 檔個股在產業板塊上的分佈情況，判斷目前市場資金的主攻方向。

    ## 5. 結論與風控重點
    - 總結動能交易的市場通則與常見的風險控制觀點（如停損概念）。

    請確保內容詳實，直接引用搜尋到的具體數據與來源，避免空泛描述。如果你找不到 10 個，請列出所有能找到的高質量候選者。
