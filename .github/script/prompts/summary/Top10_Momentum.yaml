Top10_Momentum:
  output_path: plugin-react/ai-analysis/summary/Top10_Momentum.md
  prompt: |
    請從目前的美股市場，篩選出最具爆發力的 **TOP 10 動能強勢股 (Momentum Leaders)**。
    **重要：請使用網路搜尋功能，主動查詢公司的即時股價走勢、成交量與技術指標，以進行精準分析。**

    【篩選與分析標準】
    1. **趨勢強度 (Trend Stage)**：優先選擇處於「第二階段上升趨勢」(Stage 2 Uptrend) 的個股，股價應位於 150 日與 200 日均線之上，且 50 日均線高於 200 日均線。
    2. **相對強度 (Relative Strength, RS)**：股價表現優於大盤 (S&P 500/Nasdaq)，RS 指標應處於市場前 10%-20%，且距 52 週高點 (52-Week High) 的距離在 15% 以內。
    3. **成交量驗證 (Volume Verification)**：股價上攻時伴隨顯著的成交量放大，且在盤整期（如 VCP 形態）成交量顯著萎縮，顯示籌碼趨於穩定。
    4. **價格行為 (Price Action)**：尋找具備經典突破形態的個股（如 Cup with Handle, Flat Base, Bull Flag 等）。
    5. **基本面催化劑 (Catalysts)**：包含但不限於超預期的財報表現 (EPS Surprise)、營收加速增長、產業順風 (Industry Tailwinds) 或重大產品/合作協議發佈。

    【輸出格式要求】
    # TOP 10 市場動能強勢股深度分析報告

    ## 1. 總覽表格
    請提供一個包含以下欄位的 Markdown 表格，依動能強度排序：
    | 排名 | 代碼 | 公司名稱 | 產業 | 近3月漲幅 | 距52週高點 (%) | RSI (14) | 推薦等級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 動能環境說明
    簡述當前市場廣度 (Market Breadth) 與主流產業熱點（如 AI、能源、生技等），以及對動能股操作的風險偏好影響。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的分析：
    ### [排名]. [代碼] [公司名稱] — [近期催化劑]
    - **技術面精華**：說明其目前的價格形態（如突破基底）、均線排列狀態及相對強度表現。
    - **量價行為分析**：分析近期大漲時的成交量變化，是否存在明顯的機構買入跡象。
    - **關鍵驅動因素 (Pros)**：列出 2-3 個推動股價續創高點的核心因素。
    - **交易風險 (Cons)**：指出目前是否過度延伸 (Extended)、乖離率過大或存在潛在的回撤風險。
    - **操作建議**：給予具體的 **進場區間 (Buy Zone)**、**目標利潤 (Price Target)** 及 **停損建議 (Stop Loss)**。

    ## 4. 產業板塊集中度分析
    - 分析這 10 檔個股在產業板塊上的分佈情況，判斷目前市場的資金流向（如 Growth vs Value）。

    ## 5. 結論與風控提醒
    - 提醒動能投資中「停損執行」的極端重要性，並總結當前適合的持倉倉位建議。

    請確保分析內容嚴謹，直接引用網路搜尋到的最新股價、技術指標與新聞，避免過時數據。
