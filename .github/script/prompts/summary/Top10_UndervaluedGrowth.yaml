Top10_UndervaluedGrowth:
  output_path: plugin-react/ai-analysis/summary/Top10_UndervaluedGrowth.md
  prompt: |
    你是一位專業的市場研究分析師。你的任務是彙整目前市場上廣泛討論且符合 **GARP (Growth at a Reasonable Price, 合理價格成長股)** 策略的 **TOP 10 低估成長股**。

    **重要：請採取「市場研究綜述」的角色，而非直接提供投資建議。請優先使用網路搜尋功能，主動查詢公司最新的估值指標、分析師對未來的成長預期修正情況。**

    【研究與彙整標準】
    1. **估值吸引力 (Valuation at a Discount)**：
       - **P/E 評估**：目前的 Forward P/E 是否顯著低於其歷史平均水平。
       - **PEG 指標**：尋找市場公認 PEG 接近或低於 1.0 的個股。
    2. **成長動能 (Growth Acceleration)**：
       - 搜尋並記錄市場對其未來 1-2 年 EPS 增長預期的上修情況。
    3. **低基期原因辨識 (Low Base Logic)**：
       - 彙整導致目前股價低迷的外部原因（如短期利空、板塊輪動），並判斷市場是否認為這些因素是暫時的。
    4. **內在價值參考 (Intrinsic Value)**：
       - 引用主要金融分析平台（如 Morningstar, TipRanks, Yahoo Finance）提供的公允價值評估或折價空間數據。
    5. **市場競爭力 (Competitive Edge)**：
       - 簡述該企業在低估期仍維持的核心護城河。

    【搜尋策略建議】
    - 搜尋關鍵字如: "Best GARP stocks to buy 2024", "Undervalued growth stocks US market 2024", "Stocks with low PEG ratio 2024", "Analysts top picks undervalued growth".

    【輸出格式要求】
    # TOP 10 低估成長股 (GARP) 市場研究綜述

    > **免責聲明：本報告係基於公開市場資訊、新聞報導及分析師評論彙整而成，旨在提供資訊參考，不構成任何形式的投資建議、邀約或推薦。投資者在做出決策前應進行獨立研究。**

    ## 1. 總覽表格
    | 排名 | 代碼 | 公司名稱 | 產業 | Forward P/E | 估值分位評述 | PEG 指標 | 目標價空間 (%) | 市場評級 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. GARP 市場環境解析
    彙整當前市場環境下（如利率展望、成長股估值修復），為什麼「合理價格下的成長」受到專業機構青睞。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的市場綜述：
    ### [排名]. [代碼] [公司名稱] — [核心低估理由]
    - **財務指標摘要**：引用搜尋到的關鍵數據（ROE、營收成長率與 P/E 趨勢）。
    - **價值回歸邏輯**：彙整市場預期的股價修復催化劑（如盈餘超預期、新產品週期）。
    - **成長潛力解析**：深入分析市場看好的未來 1-2 年增長支撐點。
    - **市場擔憂 (Cons)**：列出分析師對該股可能成為「價值陷阱」(Value Trap) 的風險點。
    - **操作觀點彙整**：彙整主要分析師建議的 **適合分批佈局的價位區間** 與 **中期目標價觀點**。

    ## 4. 產業與策略配置建議
    - 分析這 10 檔個股在不同板塊的分佈情況，判斷哪些板塊正處於市場認可的低估狀態。

    ## 5. 結論與風險提示
    - 提醒投資者辨識「暫時性利空」與「基本面惡化」的差異，並強調配置多元化的重要性。

    請確保內容詳實，直接引用搜尋到的具體數據與來源，避免空泛描述。如果你找不到 10 個，請列出所有能找到的高質量候選者。
