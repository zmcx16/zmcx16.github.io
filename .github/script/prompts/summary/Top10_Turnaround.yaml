Top10_Turnaround:
  output_path: plugin-react/ai-analysis/summary/Top10_Turnaround.md
  prompt: |
    你是一位專業的市場研究分析師。你的任務是彙整目前市場上（如 Bloomberg, Reuters, CNBC, Seeking Alpha, Motley Fool 等）廣泛討論的 **TOP 10 轉機股 (Turnaround Opportunities)**。

    **重要：請採取「市場研究綜述」的角色，而非直接提供投資建議。請優先使用網路搜尋功能，主動查詢公司最新的管理層言論、債務重組公告、資產剝離進度或產業週期變化。**

    【研究與彙整標準】
    1. **轉機邏輯辨識 (Turnaround Thesis)**：彙整市場認可的轉機類型：
       - **財務重整**：債務負擔減輕、利息支出下降或自由現金流轉正。
       - **管理層變更**：新任 CEO 或管理團隊帶來的戰略轉型。
       - **業務聚焦**：出售虧損部門，專注於核心盈利業務。
       - **產業週期底部**：產業經歷深度衰退後的需求回升跡象。
    2. **財務改善跡象 (Quantifiable Recovery)**：
       - 搜尋並記錄毛利率回升、營收下滑減緩或開始轉正的數據。
    3. **安全性與估值 (Margin of Safety)**：
       - 記錄市場對其 P/B 或 P/E 處於極低水平的評價，以及市場情緒是否已過度悲觀。
    4. **技術面支撐 (Technical Support)**：
       - 描述股價是否在長期底部區域盤整，或是否展現出「利空不跌」的強勢特徵。
    5. **市場催化劑 (Catalysts)**：找出分析師一致看好的轉折事件。

    【搜尋策略建議】
    - 搜尋關鍵字如: "Best turnaround stocks to buy now 2024", "US stocks restructuring 2024", "Companies with new CEO and turnaround plan", "Debt restructuring success stories stocks 2024".

    【輸出格式要求】
    # TOP 10 轉機股 (逆境重生) 市場研究綜述

    > **免責聲明：本報告係基於公開市場資訊、新聞報導及分析師評論彙整而成，旨在提供資訊參考，不構成任何形式的投資建議、邀約或推薦。投資者在做出決策前應進行獨立研究。**

    ## 1. 總覽表格
    請提供一個包含以下欄位的表格，依市場關注度或潛在空間排序：
    | 排名 | 代碼 | 公司名稱 | 轉機類型 | 核心困境 | 關鍵催化劑 | 市場預期 (1-10) | 分析師共識 |
    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    ## 2. 轉機市場現況分析
    彙整當前市場對哪些週期性產業（如零售、傳統能源、製造業）的轉機機會討論最為熱烈。

    ## 3. 個股詳細分析 (Top 10)
    針對每檔入選個股，請提供以下結構化的市場綜述：
    ### [排名]. [代碼] [公司名稱] — [轉機進度評估]
    - **困境背景綜述**：根據新聞報導，該公司過去面臨哪些具體挑戰。
    - **轉機契機解析**：彙整目前已被公開證實的具體改善措施及市場看好的原因。
    - **近期財務亮點**：引用近期財報中顯示的復甦跡象（如營收轉折點、淨損收窄）。
    - **潛在風險點 (Risks)**：彙整市場分析師對該轉機案可能失敗的擔憂。
    - **市場預期與目標**：彙整主要券商給予的 **目標價位**、**建倉建議觀點** 及 **觀察支撐位**。

    ## 4. 轉機股配置建議彙整
    - 總結專家對於如何將轉機股納入投資組合、以及如何控制相關風險的通用性建議。

    ## 5. 結論與監控重點
    - 提醒應持續關注的具體指標（如現金流轉正時點、關鍵資產出售進度）。

    請確保內容詳實，直接引用搜尋到的具體數據與來源，避免空泛描述。如果你找不到 10 個，請列出所有能找到的高質量候選者。

